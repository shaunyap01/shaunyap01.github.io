baseURL: "https://shaunyap01.github.io" 
title: Shaun Yap
pagination:
  pagerSize: 20
theme: PaperMod

enableInlineShortcodes: true
enableRobotsTXT: true

disableKinds:
  - sitemap

taxonomies:
    tag: tags

menu:
    main:
        - name: CV
          url: cv.pdf
          weight: 1

        - name: Articles
          url: articles/
          weight: 2

        - name: Projects
          url: projects/
          weight: 3
          
        - name: Tags
          url: tags/
          weight: 4

params:
    description: "This is Shaun Yap's personal website"
    author: Shaun Yap
    # googleAnalyticsID: "G-XXXXX"
    DateFormat: "January 2006"
    defaultTheme: light
    hideFooter: true
    disableThemeToggle: true
    ShowShareButtons: false
    ShowReadingTime: false
    disableSpecial1stPost: true
    disableAnchoredHeadings: true
    ShowPostNavLinks: false
    ShowBreadCrumbs: false
    ShowCodeCopyButtons: true
    ShowRssButtonInSectionTermList: false
    ShowToc: false
    disableScrollToTop: true
    TocOpen: true
    ShowWordCount: false
    UseHugoToc: true
    comments: false
    math: true
    profileMode:
          enabled: true
          title: Shaun Yap
          subtitle: "'If I have seen further it is by standing on the shoulders of Giants' - Isaac Newton.
            <br>
            <br>
            I have an unquenchable thirst for knowledge and a deep passion for sharing what I learn. Through my research and projects, I hope to inspire and assist other curious minds. It's a real shame that so much valuable work produced at university often goes unnoticed - this space is my small way of changing that.
            <br>
            <br>
            <b> Programming Languages</b>: R, Python, Julia, SQL, Tableau, Node, React, CSS."

          imageUrl: "photo.png"
          imageWidth: 160
          imageHeight: 160
          imageTitle: SY
          buttons:
            - name: CV
              url: cv.pdf
            - name: Articles
              url: articles/
            - name: Projects
              url: projects/
            - name: Tags
              url: tags/
         
    socialIcons:
        - name: GitHub
          url: https://github.com/shaunyap01

        - name: Email
          url: mailto:shaunyap01@gmail.com

        - name: LinkedIn
          url: https://www.linkedin.com/in/shaunyap0122/

        - name: Discord
          url: https://discordapp.com/users/228868600214192128

    assets:
        disableHLJS: true
        disableScrollBarStyle: true
        favicon: "/favicon.ico"
        favicon16x16: "/favicon-16x16.png"
        favicon32x32: "/favicon-32x32.png"
        apple_touch_icon: "/apple-touch-icon.png"
        mask_icon: "/safari-pinned-tab.svg"
    cover:
        hiddenInList: false
        hiddenInSingle: true
    label:
      text: "Shaun Yap"
      icon: /favicon.ico
      iconHeight: 18

markup:
    goldmark:
        renderer:
            unsafe: true
    highlight:
        guessSyntax: true
        style: autumn 
    tableOfContents:
        endLevel: 3
        ordered: false
        startLevel: 1